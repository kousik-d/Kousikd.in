<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6D5BFF"/>
      <stop offset="1" stop-color="#BF5AF2"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#bg)"/>
  <circle cx="650" cy="100" r="100" fill="white" fill-opacity="0.1"/>
  <!-- Component grid -->
  <rect x="60" y="80" width="160" height="100" rx="16" fill="white" fill-opacity="0.12"/>
  <rect x="70" y="95" width="140" height="8" rx="4" fill="white" fill-opacity="0.3"/>
  <rect x="70" y="110" width="100" height="6" rx="3" fill="white" fill-opacity="0.15"/>
  <rect x="70" y="130" width="140" height="36" rx="8" fill="white" fill-opacity="0.2"/>
  <text x="140" y="153" fill="white" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Carousel</text>
  <rect x="240" y="80" width="160" height="100" rx="16" fill="white" fill-opacity="0.12"/>
  <circle cx="320" cy="130" r="28" fill="white" fill-opacity="0.25"/>
  <text x="320" y="175" fill="white" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Avatar</text>
  <rect x="420" y="80" width="160" height="100" rx="16" fill="white" fill-opacity="0.12"/>
  <rect x="435" y="100" width="130" height="60" rx="12" fill="white" fill-opacity="0.2"/>
  <text x="500" y="175" fill="white" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Image Loader</text>
  <!-- Code block -->
  <rect x="60" y="210" width="520" height="180" rx="20" fill="#0d0d12" fill-opacity="0.85"/>
  <circle cx="85" cy="235" r="6" fill="#FF453A"/>
  <circle cx="105" cy="235" r="6" fill="#FFD60A"/>
  <circle cx="125" cy="235" r="6" fill="#30D158"/>
  <text x="80" y="270" fill="#BF5AF2" font-family="ui-monospace,monospace" font-size="13">import SenkoUI</text>
  <text x="80" y="295" fill="white" fill-opacity="0.7" font-family="ui-monospace,monospace" font-size="13">CarouselView(items: photos)</text>
  <text x="80" y="320" fill="white" fill-opacity="0.7" font-family="ui-monospace,monospace" font-size="13">  .autoScroll(interval: 3)</text>
  <text x="80" y="345" fill="white" fill-opacity="0.7" font-family="ui-monospace,monospace" font-size="13">  .pageIndicator(.dots)</text>
  <text x="80" y="370" fill="#64D2FF" font-family="ui-monospace,monospace" font-size="13">// Swift Package Manager</text>
  <text x="40" y="440" fill="white" fill-opacity="0.7" font-family="system-ui,sans-serif" font-size="14" font-weight="600">SenkoUI</text>
</svg>
